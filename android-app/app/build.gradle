plugins {
    id "com.android.application"
}

android {
    namespace "ai.liquid.lfmdemo"
    compileSdk 35

    defaultConfig {
        applicationId "ai.liquid.lfmdemo"
        minSdk 28
        targetSdk 35
        versionCode 2
        versionName "0.2.0-profile"
    }

    packaging {
        jniLibs {
            useLegacyPackaging = true
            keepDebugSymbols += ["**/*.so"]
        }
    }
}
